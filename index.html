<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>GitHub Repo Health Predictor</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.56.0/build/stlite.css"
    />
  </head>
  <body>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.56.0/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: ["pandas", "scikit-learn", "matplotlib", "requests", "PyGithub", "seaborn", "joblib"],
          entrypoint: "app.py",
          files: {
            "app.py": { url: "./newpro/app.py" },
            "config.py": { url: "./newpro/config.py" },
            "explanation.py": { url: "./newpro/explanation.py" },
            "github_fetcher.py": { url: "./newpro/github_fetcher.py" },
            "visualizations.py": { url: "./newpro/visualizations.py" },
            "models/random_forest_model.pkl": { url: "./newpro/models/random_forest_model.pkl" },
            "models/label_encoder.pkl": { url: "./newpro/models/label_encoder.pkl" },
            "models/feature_columns.pkl": { url: "./newpro/models/feature_columns.pkl" }
          },
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
